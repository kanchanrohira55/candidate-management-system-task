name: Application CI

on:
  push:
    branches: [ main, dev, staging ]
  pull_request:
    branches: [ main, dev, staging ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      JWT_SECRET: ci_test_secret_key
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/candidate_management_test
      FRONTEND_URL: http://localhost:5173

    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: |
          ./backend/package-lock.json
          ./frontend/package-lock.json

    - name: Backend | Install dependencies
      run: npm ci

    - name: Backend | Audit production dependencies
      run: npm audit --audit-level=high --omit=dev

    - name: Backend | Validate Prisma schema
      run: npx prisma validate

    - name: Backend | Generate Prisma client
      run: npx prisma generate

    - name: Backend | Prepare test database
      run: node -e "console.log('NODE_ENV=test uses the in-memory test database adapter; no external database service is required for CI.')"

    - name: Backend | Run automated tests
      run: npm test

    - name: Frontend | Install dependencies
      run: npm ci
      working-directory: ./frontend

    - name: Frontend | Audit production dependencies
      run: npm audit --audit-level=high --omit=dev
      working-directory: ./frontend

    - name: Frontend | Build
      run: npm run build
      working-directory: ./frontend
