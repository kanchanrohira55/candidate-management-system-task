services:
  - type: web
    name: fresh-shifts-candidate-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
